name: Daily Dessin Notify

on:
  schedule:
    # 毎日 UTCの午前3時（＝日本時間の昼12時）に実行する設定です
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリの中にあるファイルを取り出す
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Pythonを使える環境を準備する
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 必要なライブラリをインストールする
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      # 4. GitHub Secretsの鍵を読み込んで、Pythonスクリプトを実行する
      - name: Run Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # ↓ 一番最後のこの部分を、実際のファイル名に書き換えています
        run: python drawing_alarm.py
